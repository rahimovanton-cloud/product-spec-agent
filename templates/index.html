<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Search</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080818;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* Vivid animated blobs — make glassmorphism pop */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 480px; height: 480px; background: #7c3aed; top: -120px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 360px; height: 360px; background: #0ea5e9; bottom: -80px; right: -60px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; left: 30%; animation-delay: -8s; }
  .blob-4 { width: 250px; height: 250px; background: #f97316; bottom: 10%; left: 10%; animation-delay: -2s; }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 20px) scale(1.08); }
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 1080px;
    position: relative;
    z-index: 1;
  }

  /* Glass card */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(32px) saturate(180%);
    -webkit-backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px;
    padding: 36px;
    min-height: 540px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -1px 0 rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }

  /* === LEFT === */
  .logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .logo-text { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .logo-sub  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  label {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 10px; display: block;
  }

  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 15px 18px;
    font-size: 15px;
    color: #fff;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 14px;
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  input:focus {
    border-color: rgba(124,58,237,0.7);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  .examples { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 28px; }
  .chip {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 13px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover {
    background: rgba(124,58,237,0.25);
    border-color: rgba(124,58,237,0.5);
    color: rgba(255,255,255,0.9);
  }

  .search-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #7c3aed 0%, #0ea5e9 100%);
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; color: #fff;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.2px; margin-top: auto;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.5); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* === RIGHT === */
  .panel-title {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 24px;
  }

  /* Empty */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .empty-icon { font-size: 44px; opacity: 0.2; }
  .empty-text { font-size: 14px; color: rgba(255,255,255,0.2); text-align: center; line-height: 1.6; }

  /* Loading */
  .loading {
    flex: 1; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #7c3aed;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: rgba(255,255,255,0.35); }

  /* Result */
  .result { display: none; flex-direction: column; gap: 18px; }

  .product-name {
    font-size: 21px; font-weight: 800;
    color: #fff; line-height: 1.3; letter-spacing: -0.5px;
  }
  .product-query { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 3px; }

  /* Specs grid */
  .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .spec-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 14px 18px;
    backdrop-filter: blur(8px);
  }
  .spec-label {
    font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
  }
  .spec-value { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .spec-unit { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.35); margin-left: 3px; }

  /* Confidence */
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.2px;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge.high   { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
  .badge.medium { background: rgba(251,191,36,0.12);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
  .badge.low    { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
  .badge.high   .badge-dot { background: #34d399; box-shadow: 0 0 6px #34d399; }
  .badge.medium .badge-dot { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
  .badge.low    .badge-dot { background: #f87171; box-shadow: 0 0 6px #f87171; }

  .notes-text { font-size: 12px; color: rgba(255,255,255,0.2); line-height: 1.6; }

  /* PDF card — prominent */
  .pdf-card {
    display: none;
    align-items: center; gap: 16px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(14,165,233,0.12));
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 16px;
    text-decoration: none;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .pdf-card:hover {
    background: linear-gradient(135deg, rgba(124,58,237,0.28), rgba(14,165,233,0.2));
    border-color: rgba(124,58,237,0.6);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .pdf-icon-wrap {
    width: 42px; height: 42px; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px rgba(124,58,237,0.4);
  }
  .pdf-info { flex: 1; }
  .pdf-title { font-size: 14px; font-weight: 700; color: #fff; }
  .pdf-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .pdf-arrow { font-size: 18px; color: rgba(124,58,237,0.8); }

  /* Error */
  .error-msg {
    display: none; padding: 16px 20px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 14px; font-size: 14px; color: #f87171; line-height: 1.5;
  }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
    .card { min-height: auto; padding: 28px; }
  }
</style>
</head>
<body>

<!-- Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="container">

  <!-- LEFT -->
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📐</div>
      <div>
        <div class="logo-text">Spec Search</div>
        <div class="logo-sub">Поиск технических характеристик</div>
      </div>
    </div>

    <label>Название устройства</label>
    <input type="text" id="query" placeholder="Sony FX3, Blackmagic URSA Mini Pro..." />

    <div style="margin-bottom:24px">
      <label style="margin-bottom:8px">Примеры</label>
      <div class="examples">
        <div class="chip" onclick="setQuery('Sony FX3')">Sony FX3</div>
        <div class="chip" onclick="setQuery('Blackmagic URSA Mini Pro 12K')">URSA Mini Pro 12K</div>
        <div class="chip" onclick="setQuery('Canon EOS R5')">Canon EOS R5</div>
        <div class="chip" onclick="setQuery('DJI Ronin 4D')">DJI Ronin 4D</div>
        <div class="chip" onclick="setQuery('Atomos Shogun')">Atomos Shogun</div>
      </div>
    </div>

    <button class="search-btn" id="searchBtn" onclick="search()">
      Найти характеристики →
    </button>
  </div>

  <!-- RIGHT -->
  <div class="card">
    <div class="panel-title">Результат</div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Введите название устройства<br>и нажмите «Найти»</div>
    </div>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Поиск характеристик...</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="resultState">
      <div>
        <div class="product-name" id="productName"></div>
        <div class="product-query" id="productQuery"></div>
      </div>

      <div class="specs-grid" id="specsGrid"></div>

      <div>
        <div class="badge" id="confidenceBadge">
          <span class="badge-dot"></span>
          <span id="confidenceText"></span>
        </div>
      </div>

      <div class="notes-text" id="notesText"></div>

      <!-- PDF card -->
      <a class="pdf-card" id="pdfCard" href="#" target="_blank">
        <div class="pdf-icon-wrap">📄</div>
        <div class="pdf-info">
          <div class="pdf-title">Скачать мануал</div>
          <div class="pdf-sub">Официальный PDF от производителя</div>
        </div>
        <div class="pdf-arrow">↗</div>
      </a>
    </div>
  </div>

</div>

<script>
function setQuery(text) {
  document.getElementById('query').value = text;
  document.getElementById('query').focus();
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

function showState(name) {
  ['emptyState','loadingState','resultState','errorMsg'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
  });
  const target = document.getElementById(name);
  if (name === 'loadingState' || name === 'emptyState') {
    target.style.display = 'flex';
  } else if (name === 'resultState') {
    target.style.display = 'flex';
  } else {
    target.style.display = 'block';
  }
}

async function search() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  showState('loadingState');

  const steps = [
    'Поиск в Perplexity...',
    'Анализ источников...',
    'Загружаю страницу производителя...',
    'Claude читает характеристики...',
    'Проверяю данные...'
  ];
  let step = 0;
  const loadingText = document.getElementById('loadingText');
  const stepTimer = setInterval(() => {
    loadingText.textContent = steps[Math.min(step++, steps.length - 1)];
  }, 4000);

  try {
    const res = await fetch('/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query})
    });
    const data = await res.json();
    clearInterval(stepTimer);

    if (data.error) {
      document.getElementById('errorMsg').textContent = data.error;
      showState('errorMsg');
    } else {
      renderResult(query, data);
      showState('resultState');
    }
  } catch (e) {
    clearInterval(stepTimer);
    document.getElementById('errorMsg').textContent = 'Ошибка соединения с сервером.';
    showState('errorMsg');
  } finally {
    btn.disabled = false;
  }
}

function renderResult(query, d) {
  document.getElementById('productName').textContent = d.official_name || query;
  const queryEl = document.getElementById('productQuery');
  queryEl.textContent = (d.official_name && d.official_name.toLowerCase() !== query.toLowerCase())
    ? `запрос: ${query}` : '';

  const specs = [
    {label: 'Вес',    value: d.weight_kg, unit: 'кг'},
    {label: 'Ширина', value: d.width_mm,  unit: 'мм'},
    {label: 'Высота', value: d.height_mm, unit: 'мм'},
    {label: 'Глубина',value: d.depth_mm,  unit: 'мм'},
  ].filter(s => s.value != null);

  document.getElementById('specsGrid').innerHTML = specs.map(s => `
    <div class="spec-card">
      <div class="spec-label">${s.label}</div>
      <div class="spec-value">${s.value}<span class="spec-unit">${s.unit}</span></div>
    </div>
  `).join('');

  const conf = d.confidence || 'low';
  const badge = document.getElementById('confidenceBadge');
  badge.className = `badge ${conf}`;
  const labels = {high: 'Высокая достоверность', medium: 'Средняя достоверность', low: 'Низкая достоверность'};
  document.getElementById('confidenceText').textContent = labels[conf] || conf;

  document.getElementById('notesText').textContent = d.notes || '';

  const pdfCard = document.getElementById('pdfCard');
  if (d.pdf_url) {
    pdfCard.href = d.pdf_url;
    pdfCard.style.display = 'flex';
  } else {
    pdfCard.style.display = 'none';
  }
}
</script>
</body>
</html>
