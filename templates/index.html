<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Search</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080818;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow: hidden; position: relative;
  }

  .blob {
    position: fixed; border-radius: 50%; filter: blur(70px);
    opacity: 0.55; pointer-events: none; z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 480px; height: 480px; background: #7c3aed; top: -120px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 360px; height: 360px; background: #0ea5e9; bottom: -80px; right: -60px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; left: 30%; animation-delay: -8s; }
  .blob-4 { width: 250px; height: 250px; background: #f97316; bottom: 10%; left: 10%; animation-delay: -2s; }
  @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,20px) scale(1.08); } }

  .container {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    width: 100%; max-width: 1080px; position: relative; z-index: 1;
  }

  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(32px) saturate(180%);
    -webkit-backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px; padding: 32px; min-height: 560px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    display: flex; flex-direction: column;
  }

  /* Logo */
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    border-radius: 13px; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .logo-text { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .logo-sub  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* Mode tabs */
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 22px; }
  .mode-tab {
    flex: 1; padding: 10px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.4); cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .mode-tab:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.7); }
  .mode-tab.active {
    background: rgba(124,58,237,0.25);
    border-color: rgba(124,58,237,0.55);
    color: #fff;
    box-shadow: 0 0 16px rgba(124,58,237,0.2);
  }
  .mode-tab .tab-icon { font-size: 16px; display: block; margin-bottom: 3px; }

  label {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 10px; display: block;
  }

  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 15px 18px;
    font-size: 15px; color: #fff; outline: none;
    transition: all 0.2s; margin-bottom: 14px;
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  input:focus {
    border-color: rgba(124,58,237,0.7);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  .examples { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px; }
  .chip {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 13px; font-size: 12px;
    color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { background: rgba(124,58,237,0.25); border-color: rgba(124,58,237,0.5); color: rgba(255,255,255,0.9); }

  .search-btn {
    width: 100%; padding: 15px; margin-top: auto;
    background: linear-gradient(135deg, #7c3aed 0%, #0ea5e9 100%);
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; color: #fff;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.5); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* RIGHT */
  .panel-title {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 22px;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .empty-icon { font-size: 44px; opacity: 0.2; }
  .empty-text { font-size: 14px; color: rgba(255,255,255,0.2); text-align: center; line-height: 1.6; }

  .loading {
    flex: 1; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #7c3aed; border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: rgba(255,255,255,0.35); }

  /* === SPECS RESULT === */
  .result-specs { display: none; flex-direction: column; gap: 16px; }
  .product-name { font-size: 21px; font-weight: 800; color: #fff; line-height: 1.3; letter-spacing: -0.5px; }
  .product-query { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 3px; }

  .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .spec-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 14px 18px;
  }
  .spec-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .spec-value { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .spec-unit  { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.35); margin-left: 3px; }

  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge.high   { background: rgba(52,211,153,0.12);  color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
  .badge.medium { background: rgba(251,191,36,0.12);   color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
  .badge.low    { background: rgba(248,113,113,0.12);  color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
  .badge.high   .badge-dot { background: #34d399; box-shadow: 0 0 6px #34d399; }
  .badge.medium .badge-dot { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
  .badge.low    .badge-dot { background: #f87171; box-shadow: 0 0 6px #f87171; }
  .notes-text { font-size: 12px; color: rgba(255,255,255,0.2); line-height: 1.6; }

  .pdf-card {
    display: none; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(14,165,233,0.12));
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 16px; text-decoration: none; transition: all 0.2s;
  }
  .pdf-card:hover { background: linear-gradient(135deg, rgba(124,58,237,0.28), rgba(14,165,233,0.2)); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.3); }
  .pdf-icon-wrap {
    width: 42px; height: 42px; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    border-radius: 11px; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }
  .pdf-info { flex: 1; }
  .pdf-title { font-size: 14px; font-weight: 700; color: #fff; }
  .pdf-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .pdf-arrow { font-size: 18px; color: rgba(124,58,237,0.8); }

  /* === MANUAL RESULT === */
  .result-manual { display: none; flex-direction: column; gap: 10px; }
  .manual-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; text-decoration: none;
    transition: all 0.2s;
  }
  .manual-item:hover {
    background: rgba(14,165,233,0.12);
    border-color: rgba(14,165,233,0.35);
    transform: translateX(3px);
  }
  .manual-num {
    width: 32px; height: 32px; flex-shrink: 0;
    background: rgba(14,165,233,0.15); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #0ea5e9;
  }
  .manual-info { flex: 1; min-width: 0; }
  .manual-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manual-url   { font-size: 11px; color: rgba(255,255,255,0.25); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .manual-arrow { font-size: 16px; color: rgba(14,165,233,0.5); flex-shrink: 0; }

  /* === IMAGES RESULT === */
  .result-images { display: none; flex-direction: column; gap: 12px; }
  .images-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .img-card {
    border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.2s; aspect-ratio: 4/3;
    position: relative;
  }
  .img-card:hover { transform: scale(1.02); border-color: rgba(124,58,237,0.5); box-shadow: 0 4px 20px rgba(124,58,237,0.3); }
  .img-card img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.2s;
    display: flex; align-items: flex-end; padding: 10px;
  }
  .img-card:hover .img-overlay { opacity: 1; }
  .img-open {
    font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600;
    background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 6px;
  }

  /* Error */
  .error-msg {
    display: none; padding: 16px 20px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 14px; font-size: 14px; color: #f87171; line-height: 1.5;
  }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
    .card { min-height: auto; padding: 24px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="container">

  <!-- LEFT -->
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📐</div>
      <div>
        <div class="logo-text">Spec Search</div>
        <div class="logo-sub">Поиск данных о технике</div>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="specs" onclick="setMode('specs')">
        <span class="tab-icon">📐</span>Характеристики
      </div>
      <div class="mode-tab" data-mode="manual" onclick="setMode('manual')">
        <span class="tab-icon">📄</span>Мануал
      </div>
      <div class="mode-tab" data-mode="images" onclick="setMode('images')">
        <span class="tab-icon">🖼</span>Фото
      </div>
    </div>

    <label>Название устройства</label>
    <input type="text" id="query" placeholder="Sony FX3, Blackmagic URSA Mini Pro..." />

    <div style="margin-bottom:20px">
      <label style="margin-bottom:8px">Примеры</label>
      <div class="examples">
        <div class="chip" onclick="setQuery('Sony FX3')">Sony FX3</div>
        <div class="chip" onclick="setQuery('Blackmagic URSA Mini Pro 12K')">URSA Mini Pro 12K</div>
        <div class="chip" onclick="setQuery('Canon EOS R5')">Canon EOS R5</div>
        <div class="chip" onclick="setQuery('DJI Ronin 4D')">DJI Ronin 4D</div>
        <div class="chip" onclick="setQuery('Atomos Shogun')">Atomos Shogun</div>
      </div>
    </div>

    <button class="search-btn" id="searchBtn" onclick="search()">
      <span id="btnText">Найти характеристики →</span>
    </button>
  </div>

  <!-- RIGHT -->
  <div class="card">
    <div class="panel-title" id="panelTitle">Результат</div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon" id="emptyIcon">🔍</div>
      <div class="empty-text" id="emptyText">Введите название устройства<br>и нажмите «Найти»</div>
    </div>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Поиск...</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- SPECS -->
    <div class="result-specs" id="resultSpecs">
      <div>
        <div class="product-name" id="specsName"></div>
        <div class="product-query" id="specsQuery"></div>
      </div>
      <div class="specs-grid" id="specsGrid"></div>
      <div><div class="badge" id="confidenceBadge"><span class="badge-dot"></span><span id="confidenceText"></span></div></div>
      <div class="notes-text" id="notesText"></div>
      <a class="pdf-card" id="pdfCard" href="#" target="_blank">
        <div class="pdf-icon-wrap">📄</div>
        <div class="pdf-info">
          <div class="pdf-title">Скачать мануал</div>
          <div class="pdf-sub">Официальный PDF от производителя</div>
        </div>
        <div class="pdf-arrow">↗</div>
      </a>
    </div>

    <!-- MANUAL -->
    <div class="result-manual" id="resultManual">
      <div>
        <div class="product-name" id="manualName"></div>
        <div class="product-query" style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px" id="manualQuery"></div>
      </div>
      <div id="manualList"></div>
    </div>

    <!-- IMAGES -->
    <div class="result-images" id="resultImages">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div class="product-name" id="imagesName"></div>
        <a id="driveFolderBtn" href="#" target="_blank" style="display:none;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:rgba(66,133,244,0.15);border:1px solid rgba(66,133,244,0.4);color:#4285f4;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s">
          <svg width="16" height="16" viewBox="0 0 87.3 78" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.5c-.8 1.4-1.2 2.95-1.2 4.5h27.5z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H60l5.55 10.45z" fill="#ea4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="M60 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.5c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="M73.4 26.5l-12.6-21.8c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 60 53h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
          Открыть в Google Drive
        </a>
      </div>
      <div class="images-grid" id="imagesGrid"></div>
    </div>
  </div>

</div>

<script>
let currentMode = 'specs';

const modeConfig = {
  specs:  { btn: 'Найти характеристики →', icon: '🔍', hint: 'Вес, габариты, технические данные' },
  manual: { btn: 'Найти мануал →',          icon: '📄', hint: 'PDF инструкции и руководства' },
  images: { btn: 'Найти фото →',             icon: '🖼', hint: 'Официальные фото продукта' },
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('btnText').textContent = modeConfig[mode].btn;
  document.getElementById('emptyIcon').textContent = modeConfig[mode].icon;
  document.getElementById('emptyText').textContent = modeConfig[mode].hint + '\n\nВведите название и нажмите «Найти»';
  showState('emptyState');
}

function setQuery(text) {
  document.getElementById('query').value = text;
  document.getElementById('query').focus();
}

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

function showState(name) {
  ['emptyState','loadingState','resultSpecs','resultManual','resultImages','errorMsg'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = 'none';
  });
  const target = document.getElementById(name);
  if (!target) return;
  if (name === 'loadingState' || name === 'emptyState') target.style.display = 'flex';
  else target.style.display = 'flex';
}

async function search() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  document.getElementById('searchBtn').disabled = true;
  showState('loadingState');

  const stepsByMode = {
    specs:  ['Поиск в Perplexity...', 'Анализ источников...', 'Загружаю производителя...', 'Claude читает...', 'Проверяю данные...'],
    manual: ['Ищу мануалы...', 'Проверяю официальный сайт...', 'Собираю ссылки...'],
    images: ['Ищу фото...', 'Загружаю страницу производителя...', 'Отбираю лучшие...', 'Сохраняю на Google Drive...'],
  };
  const steps = stepsByMode[currentMode] || stepsByMode.specs;
  let step = 0;
  const lt = document.getElementById('loadingText');
  const timer = setInterval(() => { lt.textContent = steps[Math.min(step++, steps.length-1)]; }, 4000);

  try {
    const res = await fetch('/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query, mode: currentMode})
    });
    const data = await res.json();
    clearInterval(timer);

    if (data.error) {
      document.getElementById('errorMsg').textContent = data.error;
      showState('errorMsg');
    } else {
      if (currentMode === 'specs')  renderSpecs(query, data);
      if (currentMode === 'manual') renderManual(query, data);
      if (currentMode === 'images') renderImages(query, data);
    }
  } catch(e) {
    clearInterval(timer);
    document.getElementById('errorMsg').textContent = 'Ошибка соединения с сервером.';
    showState('errorMsg');
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

function renderSpecs(query, d) {
  document.getElementById('specsName').textContent = d.official_name || query;
  document.getElementById('specsQuery').textContent =
    (d.official_name && d.official_name.toLowerCase() !== query.toLowerCase()) ? `запрос: ${query}` : '';

  const specs = [
    {label:'Вес',    value:d.weight_kg, unit:'кг'},
    {label:'Ширина', value:d.width_mm,  unit:'мм'},
    {label:'Высота', value:d.height_mm, unit:'мм'},
    {label:'Глубина',value:d.depth_mm,  unit:'мм'},
  ].filter(s => s.value != null);

  document.getElementById('specsGrid').innerHTML = specs.map(s =>
    `<div class="spec-card"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}<span class="spec-unit">${s.unit}</span></div></div>`
  ).join('');

  const conf = d.confidence || 'low';
  const badge = document.getElementById('confidenceBadge');
  badge.className = `badge ${conf}`;
  document.getElementById('confidenceText').textContent = {high:'Высокая достоверность',medium:'Средняя достоверность',low:'Низкая достоверность'}[conf] || conf;
  document.getElementById('notesText').textContent = d.notes || '';

  const pdfCard = document.getElementById('pdfCard');
  pdfCard.style.display = d.pdf_url ? 'flex' : 'none';
  if (d.pdf_url) pdfCard.href = d.pdf_url;

  showState('resultSpecs');
}

function renderManual(query, d) {
  document.getElementById('manualName').textContent = d.official_name || query;
  document.getElementById('manualQuery').textContent =
    (d.official_name && d.official_name.toLowerCase() !== query.toLowerCase()) ? `запрос: ${query}` : '';

  const manuals = d.manuals || [];
  document.getElementById('manualList').innerHTML = manuals.map((m, i) =>
    `<a class="manual-item" href="${m.url}" target="_blank">
      <div class="manual-num">${i+1}</div>
      <div class="manual-info">
        <div class="manual-title">${m.title}</div>
        <div class="manual-url">${m.url}</div>
      </div>
      <div class="manual-arrow">↗</div>
    </a>`
  ).join('');

  showState('resultManual');
}

function renderImages(query, d) {
  document.getElementById('imagesName').textContent = d.official_name || query;

  // Drive folder button
  const driveBtn = document.getElementById('driveFolderBtn');
  if (d.folder_url) {
    driveBtn.href = d.folder_url;
    driveBtn.style.display = 'flex';
  } else {
    driveBtn.style.display = 'none';
  }

  const images = d.images || [];
  document.getElementById('imagesGrid').innerHTML = images.map(img =>
    `<div class="img-card" onclick="window.open('${img.url}','_blank')">
      <img src="${img.url}" alt="${img.alt}" loading="lazy" onerror="this.closest('.img-card').style.display='none'">
      <div class="img-overlay"><span class="img-open">Открыть ↗</span></div>
    </div>`
  ).join('');

  showState('resultImages');
}
</script>
</body>
</html>
